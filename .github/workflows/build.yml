name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          pip install cython buildozer

      - name: Install Android SDK
        run: |
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          cd /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools/* .
          rmdir cmdline-tools
          export PATH=$PATH:$PWD/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
          cd /home/runner/.buildozer/android/platform/android-sdk
          ln -s cmdline-tools/latest tools
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          buildozer init
          cat >> buildozer.spec << 'EOF'
          android.accept_sdk_license = True
          android.ndk = 23b
          android.sdk = 30
          android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk
          EOF
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0,kivymd==1.2.0,requests/' buildozer.spec
          sed -i 's/# android.permissions =/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/orientation = landscape/orientation = portrait/' buildozer.spec
          buildozer -v android debug
        env:
          HOME: /home/runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waimai-assistant
          path: bin/*.apk