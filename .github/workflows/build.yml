name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          pip install cython buildozer

      - name: Build APK
        run: |
          buildozer init
          # 修改配置（排除模型文件）
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.3.0,kivymd==1.2.0,requests/' buildozer.spec
          sed -i 's/# android.permissions =/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/# android.api =/android.api = 30/' buildozer.spec
          sed -i 's/# android.minapi =/android.minapi = 21/' buildozer.spec
          sed -i 's/orientation = landscape/orientation = portrait/' buildozer.spec
          buildozer -v android debug
        env:
          HOME: /home/runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waimai-assistant
          path: bin/*.apk
          