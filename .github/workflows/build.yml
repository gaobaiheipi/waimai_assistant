name: Build APK with Docker

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = WaimaiAssistant
          package.name = waimaiassistant
          package.domain = com.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf,ttc,otf
          version = 0.1
          requirements = python3,kivy==2.3.0,kivymd==1.2.0,requests
          orientation = portrait
          fullscreen = 1
          android.permissions = INTERNET
          android.api = 30
          android.minapi = 21
          android.ndk = 23b
          android.sdk = 30
          android.archs = armeabi-v7a
          android.allow_backup = True
          android.accept_sdk_license = True
          log_level = 2
          warn_on_root = 1
          EOF

          docker run --rm \
            -v $(pwd):/home/user/hostcwd \
            -w /home/user/hostcwd \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "echo y | buildozer -v android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waimai-assistant
          path: bin/*.apk