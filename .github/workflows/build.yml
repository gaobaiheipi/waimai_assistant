name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          pip install cython buildozer huggingface-hub

      - name: Download 0.5B model
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
            repo_id='Qwen/Qwen2.5-0.5B-Instruct',
            local_dir='./models/Qwen/Qwen2.5-0.5B-Instruct',
            endpoint='https://hf-mirror.com',
            resume_download=True
          )
          "
          echo "Model downloaded"
          ls -la models/Qwen/Qwen2.5-0.5B-Instruct/

      - name: Build APK
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = WaimaiAssistant
package.name = waimaiassistant
package.domain = com.example
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,ttf,ttc,otf
version = 0.1
requirements = python3,kivy==2.3.0,kivymd==1.2.0,requests,protobuf,sentencepiece,torch,transformers,huggingface-hub
orientation = portrait
fullscreen = 1
android.permissions = INTERNET
android.api = 30
android.minapi = 21
android.ndk = 23b
android.sdk = 30
android.archs = armeabi-v7a
android.allow_backup = True
android.accept_sdk_license = True
log_level = 2
warn_on_root = 1
EOF
          buildozer -v android debug
        env:
          HOME: /home/runner

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waimai-assistant
          path: bin/*.apk